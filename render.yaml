# Render Blueprint — static site for BI Visual Design (Vite build).
# In the Render dashboard: New + → Blueprint → connect this repo, and Render
# reads this file. (Or create a Static Site manually with the same settings.)
services:
  - type: web
    name: bi-visual-design
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: NODE_VERSION
        value: "20"
    # SPA fallback: any path with no matching static file serves index.html.
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    # Long-cache the content-hashed assets; never cache the HTML shell.
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
